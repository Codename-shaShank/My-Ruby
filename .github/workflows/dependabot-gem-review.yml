name: Dependabot Gem Review

on:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - "Gemfile"
      - "Gemfile.lock"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review-gems:
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we need history to read base Gemfile.lock

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"   # or your repo's Ruby version
          bundler-cache: false

      - name: Generate dependency review comment
        run: ruby .github/scripts/gem_diff.rb

      - name: Ensure comment file exists
        run: |
          if [ ! -s gem_review.md ]; then
            echo "No dependency changes to report." > gem_review.md
          fi

      - name: Comment on PR with dependency summary
        uses: peter-evans/create-or-update-comment@v4
        with:
          token: ${{ github.token }}
          issue-number: ${{ github.event.pull_request.number }}
          body-file: gem_review.md
